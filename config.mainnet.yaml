# POUW Multi-Sector Chain - 主网生产环境配置
# 使用方法: 复制此文件为 config.yaml

# 网络配置
network:
  # 主网模式
  type: mainnet
  
  # 主网 ID
  chain_id: 9333
  
  # P2P 配置
  p2p:
    # 监听地址（生产环境保持 0.0.0.0）
    host: "0.0.0.0"
    port: 9333
    
    # 最大连接数
    max_peers: 100
    
    # Bootstrap 节点 - 部署时必须替换为你的实际节点地址
    # 至少需要 2 个不同机房/区域的引导节点
    bootstrap_nodes:
      - "bootstrap1.pouwchain.io:9333"
      - "bootstrap2.pouwchain.io:9333"
      # 添加更多节点以提高网络稳定性
      # - "bootstrap3.pouwchain.io:9333"
  
  # RPC 配置
  rpc:
    enabled: true
    # 生产环境必须绑定到内网或用 nginx 反向代理
    host: "127.0.0.1"
    port: 8545
    # 允许的方法（生产环境必须明确指定，禁止留空）
    allowed_methods:
      - "chain_getStatus"
      - "chain_getBlock"
      - "chain_getTransaction"
      - "chain_getBalance"
      - "chain_getBlockHeight"
      - "chain_getPendingTxCount"
      - "wallet_getBalance"
      - "wallet_getAddresses"
      - "tx_send"
      - "tx_getStatus"
    # CORS 配置 - 限制为你的前端域名
    cors_origins:
      - "https://your-frontend-domain.com"
      # 生产环境禁止加入 localhost

# 节点配置
node:
  id: ""
  name: "POUW-MainNet-Node"
  sector: "auto"
  role: full  # 生产环境建议 full 或 miner

# 挖矿配置
mining:
  enabled: false  # 根据需要开启
  miner_address: ""
  threads: 0
  
  pouw:
    accept_types:
      - "AI_INFERENCE"
      - "VIDEO_RENDER"
      - "SCIENTIFIC"
    max_concurrent: 8  # 生产环境可增加
    timeout: 600  # 生产环境增加超时

# 存储配置
storage:
  data_dir: "./data"
  backend: leveldb  # 生产环境推荐 leveldb
  block_cache_mb: 512  # 生产环境增加缓存
  compression: true

# 钱包配置
wallet:
  wallet_dir: "./wallets"
  auto_create: false  # 生产环境禁止自动创建钱包
  mnemonic_words: 24  # 生产环境用 24 词

# 日志配置
logging:
  level: INFO  # 生产环境用 INFO 或 WARNING
  file: "./logs/node.log"
  max_size_mb: 200
  max_files: 20
  console: false  # 生产环境关闭控制台输出

# 共识参数
consensus:
  target_block_time: 30
  difficulty_adjustment_interval: 10
  initial_difficulty: 4
  base_reward: 50.0
  halving_interval: 210000
  max_block_size: 1048576

# API 密钥（生产环境必须通过环境变量 POUW_ADMIN_KEY 设置，禁止留空）
# 示例: export POUW_ADMIN_KEY=$(openssl rand -hex 32)
api:
  admin_key: ""  # 警告: 留空将自动生成，但每次重启会变化！生产环境必须固定设置。
  websocket: true
  ws_port: 8546
  # 生产环境安全配置
  rate_limit: 100          # 每分钟每 IP 最大请求数
  max_request_size: 1048576 # 最大请求体 1MB

# 开发模式
dev:
  enabled: false
  debug_rpc: false
  simulated_latency: 0
