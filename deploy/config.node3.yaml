# POUW Multi-Sector Chain - 节点 3 配置
# 全节点（不挖矿，仅同步 + RPC 服务）

node:
  id: "pouw-node-3"
  role: "full"

network:
  type: "mainnet"
  chain_id: 9333
  p2p:
    host: "0.0.0.0"
    port: 9333
    external_ip: "175.27.156.47"
    bootstrap_nodes:
      - "10.206.0.14:9333"
      - "10.206.0.16:9333"
    max_peers: 50
  rpc:
    enabled: true
    host: "0.0.0.0"
    port: 8545
    cors_origins: ["http://127.0.0.1:8545", "http://localhost:8545", "http://localhost:3000"]

mining:
  enabled: false

storage:
  data_dir: "/data"
  db_engine: "sqlite"

consensus:
  target_block_time: 30
  initial_difficulty: 4

logging:
  level: "INFO"
  file: "/logs/node.log"
